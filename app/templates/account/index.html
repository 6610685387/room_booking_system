<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบจองห้อง ECE · มธ.</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: #8B0000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #8B0000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
    }

    .univ {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      line-height: 1.4;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      background: #8B0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .btn:hover {
      background: #6e0000;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #d1d5db;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">TU</div>
    <div class="univ">มหาวิทยาลัยธรรมศาสตร์</div>
    <h1>ยินดีต้อนรับสู่ระบบจองห้องประชุมและห้องเรียน<br />ภาควิชาวิศวกรรมไฟฟ้าและคอมพิวเตอร์</h1>
    <a href="/login/" class="btn">เริ่มต้นการใช้งาน</a>
  </div>
</body>

</html>
