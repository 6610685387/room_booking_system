<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ระบบจองห้อง ECE{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tu-red: #8B0000;
      --tu-red-dark: #6e0000;
      --white: #ffffff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --green-bg: #ecfdf5;
      --green-text: #065f46;
      --amber-bg: #fffbeb;
      --amber-text: #92400e;
      --red-bg: #fef2f2;
      --red-text: #991b1b;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      font-size: 15px;
      line-height: 1.6;
    }

    /* --- NAV --- */
    .navbar {
      background: var(--tu-red);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .navbar-brand {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-brand .logo-circle {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .navbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .navbar-user {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
    }
    .navbar-logout {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: var(--radius);
      padding: 4px 12px;
    }
    .navbar-logout:hover { background: rgba(255,255,255,0.1); }

    /* --- LAYOUT --- */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    .container-sm {
      max-width: 440px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    /* --- CARD --- */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 16px;
    }

    /* --- BUTTONS --- */
    .btn {
      display: inline-block;
      padding: 9px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      text-align: center;
    }
    .btn-primary { background: var(--tu-red); color: #fff; }
    .btn-primary:hover { background: var(--tu-red-dark); }
    .btn-secondary {
      background: var(--white);
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }
    .btn-secondary:hover { background: var(--gray-50); }
    .btn-success { background: #065f46; color: #fff; }
    .btn-danger { background: #991b1b; color: #fff; }
    .btn-block { display: block; width: 100%; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    /* --- FORM --- */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--gray-800);
      background: var(--white);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--tu-red);
    }
    select.form-control { cursor: pointer; }

    /* --- BADGE --- */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-pending  { background: var(--amber-bg); color: var(--amber-text); }
    .badge-approved { background: var(--green-bg);  color: var(--green-text); }
    .badge-rejected { background: var(--red-bg);    color: var(--red-text);   }
    .badge-cancelled{ background: var(--gray-100);  color: var(--gray-600);   }

    /* --- TABLE --- */
    .table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .table tr:last-child td { border-bottom: none; }

    /* --- STAT CARDS --- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 4px;
    }

    /* --- ALERT --- */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-danger { background: var(--red-bg); color: var(--red-text); border: 1px solid #fca5a5; }
    .alert-success { background: var(--green-bg); color: var(--green-text); border: 1px solid #6ee7b7; }
    .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }

    /* --- MISC --- */
    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--gray-400);
      margin-bottom: 24px;
    }
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8 { gap: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mt-8 { margin-top: 8px; }
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--gray-400); }
    .text-center { text-align: center; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar">
  <a href="{% if user.role == 'Admin' %}{% url 'admin_dashboard' %}{% else %}{% url 'lecturer_dashboard' %}{% endif %}" class="navbar-brand">
    <div class="logo-circle">TU</div>
    ระบบจองห้อง ECE
  </a>
  <div class="navbar-right">
    <span class="navbar-user">{{ user.displayname_th }}</span>
    <a href="{% url 'logout' %}" class="navbar-logout">ออกจากระบบ</a>
  </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
